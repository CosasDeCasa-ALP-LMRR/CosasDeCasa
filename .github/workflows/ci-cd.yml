name: CI/CD Pipeline

on:
  push:
    branches:
      - 'deploy-*'

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './backend-nestjs/package-lock.json'

      - name: Install Dependencies
        working-directory: ./backend-nestjs
        run: npm ci

      - name: Generate Prisma Client
        working-directory: ./backend-nestjs
        run: npx prisma generate

      - name: Run Unit Tests
        working-directory: ./backend-nestjs
        run: npm run test

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './frontend-react/package-lock.json'

      - name: Install Dependencies
        working-directory: ./frontend-react
        run: npm ci --legacy-peer-deps

      - name: Run Unit Tests
        working-directory: ./frontend-react
        run: npm run test

  deploy-frontend:
    name: Deploy Frontend to Netlify
    needs: [test-backend, test-frontend]
    if: startsWith(github.ref, 'refs/heads/deploy-') && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './frontend-react/package-lock.json'

      - name: Install Dependencies
        working-directory: ./frontend-react
        run: npm ci --legacy-peer-deps

      - name: Build Frontend
        working-directory: ./frontend-react
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: './frontend-react/dist'
          production-branch: ${{ github.ref_name }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy from GitHub Actions"
          enable-pull-request-comment: false
          enable-commit-comment: true
          overwrites-pull-request-comment: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        timeout-minutes: 5
        
  release:
    name: Semantic Release
    needs: [deploy-frontend]
    if: startsWith(github.ref, 'refs/heads/deploy-') && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Install dependencies
        run: npm ci

      - name: Run Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
