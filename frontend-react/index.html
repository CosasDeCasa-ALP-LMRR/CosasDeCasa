<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>frontend-react</title>

    <!-- Prevención básica de Inyección de Contenido -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' http://localhost:3000 ws://localhost:5173 'unsafe-inline' 'unsafe-eval' data: blob:; img-src * data: blob:;" />
    
    <!-- Prevención de Clickjacking (Frame Buster) para producción -->
    <script>
      if (window.top !== window.self) {
        window.top.location = window.self.location;
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
